# =============================================================================
# AcademiQ — Local development orchestrator (mprocs config)
# =============================================================================
# Spawns the submodule dev loops plus one log-only process per backend service.
# The backend process owns Docker Compose; service panes only tail filtered logs.
# Use:
#
#   make dev           # starts mprocs against this file (primary)
#   make dev-tmux      # tmux fallback for machines without mprocs
#   make dev-parallel  # `make -j2` last-resort fallback
#
# Keys (mprocs default):
#   ↑/↓        switch between processes
#   Ctrl-r     restart focused process
#   Ctrl-x     stop focused process
#   q          quit (sends SIGTERM to all)
# =============================================================================

procs:
  backend:
    cwd: apps/backend
    shell: make dev
  iam-service:
    cwd: apps/backend
    shell: |
      until docker compose --env-file .env -f docker-compose.yml -f docker-compose.dev.yml logs -f --tail=200 iam-service; do
        sleep 2
      done
  billing-service:
    cwd: apps/backend
    shell: |
      until docker compose --env-file .env -f docker-compose.yml -f docker-compose.dev.yml logs -f --tail=200 billing-service; do
        sleep 2
      done
  academic-config-service:
    cwd: apps/backend
    shell: |
      until docker compose --env-file .env -f docker-compose.yml -f docker-compose.dev.yml logs -f --tail=200 academic-config-service; do
        sleep 2
      done
  academic-ops-service:
    cwd: apps/backend
    shell: |
      until docker compose --env-file .env -f docker-compose.yml -f docker-compose.dev.yml logs -f --tail=200 academic-ops-service; do
        sleep 2
      done
  web:
    cwd: apps/web
    shell: make dev

mouse_scroll_speed: 1
