# =============================================================================
# AcademiQ — Local development orchestrator (mprocs config)
# =============================================================================
# Runs the backend service crates with cargo-watch ON THE HOST plus the web dev
# server. Infra (Postgres + RabbitMQ) is brought up in Docker by `make dev`
# BEFORE mprocs starts; the host env (127.0.0.1 DB/broker URLs, RUSTFLAGS=mold,
# CARGO_BUILD_JOBS, IAM keys sourced from apps/backend/.env) is exported by the
# `make dev` target and inherited by every pane here.
#
# Use:
#
#   make dev           # infra up, then this file (primary)
#   make dev-backend   # backend loop only (apps/backend/mprocs.yaml)
#   make dev-tmux      # tmux fallback for machines without mprocs
#   make dev-parallel  # `make -j2` last-resort fallback
#
# Keys (mprocs default):
#   ↑/↓        switch between processes
#   Ctrl-r     restart focused process
#   Ctrl-x     stop focused process
#   q          quit (sends SIGTERM to all)
# =============================================================================

procs:
  iam-service:
    cwd: apps/backend
    shell: cargo watch -x "run -p iam-service"
  billing-service:
    cwd: apps/backend
    shell: cargo watch -x "run -p billing-service"
  academic-config-service:
    cwd: apps/backend
    shell: cargo watch -x "run -p academic-config-service"
  academic-ops-service:
    cwd: apps/backend
    shell: cargo watch -x "run -p academic-ops-service"
  grading-service:
    cwd: apps/backend
    shell: cargo watch -x "run -p grading-service"
  web:
    cwd: apps/web
    shell: make dev

mouse_scroll_speed: 1
